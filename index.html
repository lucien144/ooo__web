<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOO — Your team's time off, sorted.</title>
    <meta name="description" content="Time-off requests, approvals, allowances and carryover — all in one place, without the spreadsheets and back-and-forth. (It's pronounced 'TrippleO'.)">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      // Pre-paint theme resolution: explicit choice wins, else system preference.
      // localStorage can throw in privacy modes — fall back to system preference.
      let stored = null
      try { stored = localStorage.getItem('ooo-theme') } catch {}
      document.documentElement.classList.toggle(
        'dark',
        stored ? stored === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches,
      )
    </script>
</head>
<body>
<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
